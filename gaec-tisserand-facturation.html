var db = firebase.firestore();
async function load(k, fb) {
  try {
    var doc = await db.collection("gaec").doc(k).get();
    if (doc.exists) {
      return doc.data().value;
    }
    return fb;
  } catch (e) {
    console.error("load error:", k, e);
    return fb;
  }
}
async function save(k, d) {
  try {
    await db.collection("gaec").doc(k).set({
      value: d,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) {
    console.error("save error:", k, e);
  }
}
function subscribe(k, cb) {
  return db.collection("gaec").doc(k).onSnapshot(function (doc) {
    if (doc.exists) {
      cb(doc.data().value);
    }
  }, function (err) {
    console.error("subscribe error:", k, err);
  });
}
